# Site
title: SRE Wiki
subtitle: Site Reliability Engineering Documentation
description: Runbooks, SOPs, and Architecture Documentation
author: SRE Team
language: en
timezone: Asia/Shanghai

# URL
url: https://yourusername.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
render_denylist:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enabled: true
  field: post
  exclude: ''
filename_case: 0
render_drafts: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: true
  tab_replace: ''
  wrap: true
  hljs: false
  lazyload: false

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
relative_link: false
per_page: 10
pagination_dir: page

# Include / Exclude
include:
exclude:
ignore:

# Extensions
theme: next

# Deployment
deploy:
  type: git
  repo: git@github.com:yourusername/yourusername.github.io.git
  branch: gh-pages
  token: ''

# Server
server:
  port: 4000
  logger: false
  logger_format: dev

# Archive
archive:
  type: yearly

# Category
category:
  enable: true