<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面未找到 - SRE Wiki</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', -apple-system, 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 55%, #fecfef 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .notfound-wrap { text-align: center; padding: 40px 24px; }
    .big-404 {
      font-size: clamp(5em, 20vw, 10em); font-weight: 800;
      background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1; margin-bottom: 20px;
    }
    h1 { font-size: 1.6em; color: white; margin-bottom: 12px; font-weight: 700; }
    p { color: rgba(255,255,255,0.85); font-size: 1em; margin-bottom: 32px; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border-radius: 50px;
      background: white; color: #c44569; font-weight: 700; font-size: 0.95em;
      text-decoration: none; box-shadow: 0 6px 24px rgba(196,69,105,0.2);
      transition: all 0.25s ease;
    }
    a:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 36px rgba(196,69,105,0.3); color: #c44569; }
  </style>
</head>
<body>
  <div class="notfound-wrap">
    <div class="big-404">404</div>
    <h1>页面不存在</h1>
    <p>你访问的页面可能已被移除或链接有误。</p>
    <a href="/">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      返回首页
    </a>
  </div>
</body>
</html>
