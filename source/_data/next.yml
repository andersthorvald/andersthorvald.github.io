# ===============================================================
# NexT Theme Configuration for SRE Wiki
# ===============================================================

# ---------------------------------------------------------------
# Scheme Settings - 选一个你喜欢的主题
# ---------------------------------------------------------------
scheme: Gemini
# scheme: Muse
# scheme: Mist
# scheme: Pisces

# Dark Mode - 支持深色模式
darkmode: false

# ---------------------------------------------------------------
# Site Information Settings
# ---------------------------------------------------------------
avatar:
  url: /images/avatar.gif
  rounded: true
  rotated: false

# Social Links
social:
  GitHub: https://github.com/andersthorvald || fab fa-github
  E-mail: mailto:3604780868@qq.com || fa fa-envelope

social_icons:
  enable: true
  icons_only: false
  transition: false

# ---------------------------------------------------------------
# Menu Settings - 添加导航菜单
# ---------------------------------------------------------------
menu:
  home: / || fa fa-home
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th
  archives: /archives/ || fa fa-archive
  about: /about/ || fa fa-user

# ---------------------------------------------------------------
# Sidebar Settings
# ---------------------------------------------------------------
sidebar:
  position: left
  # Available values: left | right - According to position to adjust the sidebar toggle
  display: post
  # Available values: post | always | hide | remove
  offset: 12
  b2t: false
  # Show back to top button
  scrollpercent: true
  # Show scroll percent

# ---------------------------------------------------------------
# Search - 开启本地搜索
# ---------------------------------------------------------------
local_search:
  enable: true
  preloader: true
  highlight:
    enable: false
  # Trigger search on input event
  trigger: auto
  # Show top n results per article, show all results by default if -1
  top_n_per_article: 1
  # Unescape html strings to reduce the number of HTML tags
  unescape: false
  languages: en

# ---------------------------------------------------------------
# Comments - 评论区留空，需要 GitHub OAuth App 配置
# ---------------------------------------------------------------
comments:
  style: third-party
  # Available values: first | second | third
  active: gitalk
  # Set as true to display comments
  setting:
    # Display comments on your archive page
    archive: false
    # Display comments on page
    page: true
    # Display comments on post
    post: true
    # Comments display location, available values: left | right
    right: 0
    # Comment word limit, setting 0 or false means no limit
    limit: 100
    # Comments sorting, available values: false | time | path
    sorting: false
  # Gitalk
  gitalk:
    enable: true
    github_id: andersthorvald
    repo: andersthorvald.github.io
    client_id: YOUR_CLIENT_ID
    client_secret: YOUR_CLIENT_SECRET
    admin_user: andersthorvald
    distraction_free_mode: true
    per_page: 10
    pager_direction: last
    create_issue_manually: true
    language: zh-CN

# ---------------------------------------------------------------
# Code Highlight - 代码高亮配置
# ---------------------------------------------------------------
codeblock:
  # Code highlight theme
  theme: default
  # Add copy button on code block
  copy_button:
    enable: true
    # Show text on the copy button
    show_result: false

# ---------------------------------------------------------------
# Post Settings - 文章页面配置
# ---------------------------------------------------------------
excerpt:
  enable: true
  hide: false

# Post meta
post_meta:
  item:
    - name: publish_date
      i18n: index.post_meta.published
    - name: categories
      i18n: index.post_meta.categories
    - name: original
      i18n: index.post_meta.original
      url: https://andersthorvald.github.io
  revised: false

# ---------------------------------------------------------------
# Tag Cloud - 标签云
# ---------------------------------------------------------------
tagcloud:
  min: 12
  max: 36
  start: -30
  end: 30
  unit: px
  amount: 200
  orderby: name
  order: 1
  include: []
  exclude: []

# ---------------------------------------------------------------
# Footer - 页脚配置
# ---------------------------------------------------------------
footer:
  since: 2026
  icon:
    user: fa fa-heart
  powered: true
  hexo: true
  theme:
    enable: true
    version: true

# ---------------------------------------------------------------
# Statistics & Analytics - 统计（留空，可后续配置）
# ---------------------------------------------------------------
busuanzi_count:
  enable: false
  total_visitors: false
  total_visitors_icon: fa fa-user
  total_views: false
  total_views_icon: fa fa-eye
  post_views: false
  post_views_icon: fa fa-eye

# ---------------------------------------------------------------
# Third Party Plugins - 其他插件配置
# ---------------------------------------------------------------
# Reading progress bar
reading_progress:
  enable: false
  color: "#37c6c0"
  height: 3px

# Sticky posts
sticky: true

# Bookmark
bookmark:
  enable: false

# Fancybox
fancybox: true

# Motion
motion:
  enable: true
  async: true

# Canvasribbon
# canvas_nest: false

# ---------------------------------------------------------------
# SRE Specific Settings
# ---------------------------------------------------------------
# Table of Contents in posts
toc:
  enable: true
  wrapper: true
  max_level: 3
  number: true
  expand: true
  init_depth: 2