body {

/* Dot grid background - soft pink dots that coordinate with pink gradient */
.dot-grid {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background-image: radial-gradient(circle, rgba(255, 182, 193, 0.4) 1px, transparent 1px);
  background-size: 30px 30px; opacity: 0.6;
}
/* Particle animation - purple particles */
.particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
.particle { position: absolute; width: 10px; height: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; opacity: 0.3; animation: float 15s infinite; }
.particle:nth-child(1) { left: 10%; animation-delay: 0s; }
.particle:nth-child(2) { left: 20%; animation-delay: 2s; }
.particle:nth-child(3) { left: 30%; animation-delay: 4s; }
.particle:nth-child(4) { left: 40%; animation-delay: 6s; }
.particle:nth-child(5) { left: 50%; animation-delay: 8s; }
.particle:nth-child(6) { left: 60%; animation-delay: 10s; }
.particle:nth-child(7) { left: 70%; animation-delay: 12s; }
.particle:nth-child(8) { left: 80%; animation-delay: 14s; }
@keyframes float { 0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.3; } 90% { opacity: 0.3; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
.hero { text-align: center; padding: 80px 20px; background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fecfef 100%); margin: 0; border-radius: 0 0 40px 40px; box-shadow: 0 10px 40px rgba(255, 154, 158, 0.3); animation: fadeIn 1s ease; }
.hero h1 { font-size: 3.5em; margin-bottom: 20px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.15); animation: slideUp 1s ease; }
.hero p { font-size: 1.3em; opacity: 0.95; animation: slideUp 1s ease 0.2s both; }
.features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin: 50px 0; }
.feature-card { background: white; padding: 40px 30px; border-radius: 20px; text-align: center; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.08); transition: all 0.3s ease; animation: fadeInUp 0.6s ease; }
.feature-card:hover { transform: translateY(-10px); box-shadow: 0 20px 60px rgba(255, 154, 158, 0.2); }
.feature-card h3 { margin-top: 0; background: linear-gradient(135deg, #ff9a9e, #fecfef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.5em; }
.feature-icon { font-size: 3em; margin-bottom: 20px; }
.quick-links { background: linear-gradient(135deg, #fff5f5 0%, #fff0f3 100%); padding: 50px; border-radius: 25px; margin: 50px 0; animation: fadeInUp 0.6s ease 0.3s both; }
.quick-links h2 { margin-top: 0; text-align: center; background: linear-gradient(135deg, #ff9a9e, #fecfef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.link-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
.link-item { display: flex; align-items: center; gap: 15px; padding: 20px 25px; background: white; border-radius: 15px; text-decoration: none; color: #333; transition: all 0.3s ease; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
.link-item:hover { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: white; transform: scale(1.02); box-shadow: 0 10px 30px rgba(255, 154, 158, 0.3); }
.link-item span { font-size: 1.5em; }
.stats { display: flex; justify-content: center; gap: 80px; margin: 60px 0; padding: 50px; background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fecfef 100%); border-radius: 25px; animation: fadeInUp 0.6s ease 0.4s both; }
.stat-item { text-align: center; color: white; }
.stat-number { font-size: 3em; font-weight: bold; display: block; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
.stat-label { font-size: 1.1em; opacity: 0.9; }
.lang-switcher { position: fixed; top: 16px; right: 20px; z-index: 1000; display: flex; gap: 6px; }
.lang-btn { background: rgba(255,255,255,0.9); border: 2px solid rgba(255,154,158,0.3); border-radius: 20px; padding: 5px 14px; font-size: 0.82em; font-weight: 700; cursor: pointer; color: #c44569; transition: all 0.2s; }
.lang-btn:hover, .lang-btn.active { background: linear-gradient(135deg, #ff9a9e, #fecfef); color: white; border-color: transparent; }

  <button class="dark-toggle" onclick="toggleDark()" title="切换深色模式">🌙</button>

  <script src="/js/lang-data.js"></script>
  <script>
    function toggleDark() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('dark-mode-manual', document.body.classList.contains('dark-mode'));
      var btn = document.querySelector('.dark-toggle');
      btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    }
    function updateDarkByTime() {
      var hour = new Date().getHours();
      var isDark = hour < 7 || hour >= 19;
      var manualSet = localStorage.getItem('dark-mode-manual');
      if (manualSet !== null) {
        isDark = manualSet === 'true';
      }
      if (isDark) {
        document.body.classList.add('dark-mode');
        document.querySelector('.dark-toggle').textContent = '☀️';
      } else {
        document.body.classList.remove('dark-mode');
        document.querySelector('.dark-toggle').textContent = '🌙';
      }
    }
    updateDarkByTime();
    setInterval(updateDarkByTime, 60000);
    I18N.init();
  </script>
