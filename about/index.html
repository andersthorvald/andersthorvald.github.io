  <style>
    :root {
      --pink-from: #ff9a9e; --pink-to: #fad0c4; --pink-accent: #fecfef;
      --pink-deep: #c44569; --text: #2d2040; --text-2: #5a5470; --muted: #9b96b0;
      --card-bg: rgba(255,255,255,0.85); --card-border: rgba(255,154,158,0.25);
      --shadow: 0 8px 32px rgba(196,69,105,0.1); --shadow-hover: 0 16px 48px rgba(196,69,105,0.2);
    }
    body {
      font-family: 'Outfit', -apple-system, 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, var(--pink-from) 0%, var(--pink-to) 55%, var(--pink-accent) 100%);
      min-height: 100vh; color: var(--text); -webkit-font-smoothing: antialiased;
    }
    body.dark-mode {
      --text: #e8e4f0; --text-2: #b0aac8; --muted: #7a7590;
      --card-bg: rgba(37,37,64,0.9); --card-border: rgba(255,154,158,0.15);
      background: #12122a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    a { color: var(--pink-deep); text-decoration: none; }
    a:hover { color: #e8356d; }

    .dot-grid {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.5) 1.2px, transparent 1.2px);
      background-size: 28px 28px; opacity: 0.45;
    }
    body.dark-mode .dot-grid { opacity: 0.04; }

    .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle {
      position: absolute; width: 8px; height: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%; opacity: 0.22; animation: float 18s infinite linear;
    }
    .particle:nth-child(1) { left: 8%;  animation-delay: 0s; }
    .particle:nth-child(2) { left: 18%; animation-delay: 3s; }
    .particle:nth-child(3) { left: 28%; animation-delay: 6s; }
    .particle:nth-child(4) { left: 38%; animation-delay: 1s; }
    .particle:nth-child(5) { left: 48%; animation-delay: 9s; }
    .particle:nth-child(6) { left: 58%; animation-delay: 4s; }
    .particle:nth-child(7) { left: 68%; animation-delay: 7s; }
    .particle:nth-child(8) { left: 78%; animation-delay: 2s; }
    body.dark-mode .particle { opacity: 0.08; }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      5% { opacity: 0.22; } 95% { opacity: 0.22; }
      100%{ transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    .blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); }
    .blob-1 { width: 500px; height: 500px; top: -150px; right: -80px; background: rgba(254,207,239,0.35); }
    .blob-2 { width: 300px; height: 300px; bottom: -80px; left: -60px; background: rgba(255,154,158,0.25); }
    body.dark-mode .blob-1 { background: rgba(102,126,234,0.08); }
    body.dark-mode .blob-2 { background: rgba(118,75,162,0.08); }

    .page-wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 60px 24px 80px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--pink-deep); text-decoration: none; font-weight: 600;
      margin-bottom: 32px; padding: 10px 20px; border-radius: 50px;
      background: var(--card-bg); border: 1px solid var(--card-border);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow); transition: all 0.25s ease;
    }
    .back-link:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); color: var(--pink-deep); }

    /* Hero header */
    .about-hero { text-align: center; margin-bottom: 48px; }
    .about-hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 16px; border-radius: 50px;
      background: rgba(255,255,255,0.85); border: 1px solid rgba(255,154,158,0.35);
      font-size: 0.78em; font-weight: 600; color: var(--pink-deep);
      backdrop-filter: blur(8px); margin-bottom: 20px;
    }
    .about-hero h1 {
      font-size: clamp(2em, 5vw, 3em); font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--pink-from), var(--pink-deep));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px; animation: fadeUp 0.6s ease both;
    }
    .about-hero p { color: var(--text-2); font-size: 1em; animation: fadeUp 0.6s ease 0.1s both; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    /* Profile card */
    .profile-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 24px; padding: 48px 40px; text-align: center;
      backdrop-filter: blur(15px); box-shadow: var(--shadow);
      animation: scaleIn 0.6s ease 0.2s both;
    }
    .profile-avatar-wrap { margin-bottom: 20px; }
    .profile-avatar {
      width: 110px; height: 110px; border-radius: 50%; object-fit: cover;
      border: 4px solid rgba(255,154,158,0.35); padding: 3px;
      background: linear-gradient(135deg, var(--pink-from), var(--pink-accent));
    }
    .profile-name { font-size: 1.8em; font-weight: 800; color: var(--text); margin-bottom: 6px; letter-spacing: -0.02em; }
    .profile-role { font-size: 0.9em; color: var(--muted); margin-bottom: 24px; font-weight: 500; }

    .interests { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .interest-tag {
      padding: 7px 18px; border-radius: 50px; font-size: 0.85em; font-weight: 600;
      background: rgba(255,154,158,0.12); color: var(--pink-deep);
      border: 1px solid rgba(255,154,158,0.2);
      transition: all 0.2s ease;
    }
    .interest-tag:hover { background: linear-gradient(135deg, var(--pink-from), var(--pink-accent)); color: white; transform: scale(1.05); }

    .profile-bio { color: var(--text-2); font-size: 0.95em; line-height: 1.8; max-width: 500px; margin: 0 auto 24px; }

    .profile-motto {
      font-style: italic; color: var(--muted); font-size: 0.9em;
      padding-top: 20px; margin-top: 20px; border-top: 1px solid rgba(255,154,158,0.15);
    }

    /* Social links */
    .social-links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 32px; }
    .social-link {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 16px 18px; border-radius: 16px;
      background: var(--card-bg); backdrop-filter: blur(10px);
      text-decoration: none; color: var(--text); font-size: 0.78em; font-weight: 600;
      transition: all 0.25s ease; min-width: 78px;
      border: 1px solid var(--card-border);
    }
    .social-link:hover { transform: translateY(-5px); }
    .social-link svg { transition: transform 0.2s; }
    .social-link:hover svg { transform: scale(1.1); }
    .social-link.wechat:hover { background: #07c160; color: white; border-color: #07c160; }
    .social-link.bilibili:hover { background: #00a1d6; color: white; border-color: #00a1d6; }
    .social-link.youtube:hover { background: #ff0000; color: white; border-color: #ff0000; }
    .social-link.github:hover { background: #24292e; color: white; border-color: #24292e; }
    .social-link.x:hover { background: #000; color: white; border-color: #000; }
    .social-link.email:hover { background: var(--pink-deep); color: white; border-color: var(--pink-deep); }

    /* QR modal */
    .qr-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 2000;
      backdrop-filter: blur(4px);
    }
    .qr-modal.active { display: flex; }
    .qr-modal-content {
      background: white; border-radius: 20px; padding: 32px; text-align: center;
      max-width: 90%; animation: scaleIn 0.25s ease;
    }
    body.dark-mode .qr-modal-content { background: #252540; }
    .qr-modal h3 { margin: 0 0 16px; color: var(--text); font-size: 1.2em; }
    .qr-modal img { max-width: 220px; border-radius: 12px; border: 3px solid rgba(255,154,158,0.3); }
    .qr-modal p { color: var(--muted); margin: 12px 0 0; font-size: 0.85em; }
    .qr-modal-close {
      margin-top: 16px; padding: 10px 28px;
      background: linear-gradient(135deg, var(--pink-from), var(--pink-accent)); color: white;
      border: none; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.9em;
      transition: all 0.25s ease;
    }
    .qr-modal-close:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255,154,158,0.3); }

    @keyframes scaleIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }

    /* Dark toggle + scroll top */
    .dark-toggle {
      position: fixed; bottom: 24px; left: 24px; z-index: 999;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.9); border: 1.5px solid rgba(255,154,158,0.35);
      cursor: pointer; font-size: 1.2em; display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow); transition: all 0.3s ease;
    }
    .dark-toggle:hover { background: linear-gradient(135deg, var(--pink-from), var(--pink-accent)); transform: scale(1.1); color: white; }
    body.dark-mode .dark-toggle { background: rgba(37,37,64,0.9); border-color: rgba(255,154,158,0.2); }

    .scroll-top {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.9); border: 1.5px solid rgba(255,154,158,0.35);
      color: var(--pink-deep); font-size: 1.2em; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: all 0.3s ease;
    }
    .scroll-top.visible { opacity: 1; pointer-events: auto; }
    .scroll-top:hover { background: linear-gradient(135deg, var(--pink-from), var(--pink-accent)); transform: scale(1.1); color: white; }
    body.dark-mode .scroll-top { background: rgba(37,37,64,0.9); border-color: rgba(255,154,158,0.2); color: var(--pink-from); }

    @media (max-width: 768px) {
      .page-wrap { padding: 40px 16px 60px; }
      .about-hero h1 { font-size: 2em; }
      .profile-card { padding: 32px 20px; border-radius: 18px; }
      .profile-avatar { width: 80px; height: 80px; }
      .social-links { gap: 8px; }
      .social-link { padding: 12px 14px; min-width: 66px; font-size: 0.72em; }
      .dark-toggle, .scroll-top { width: 38px; height: 38px; font-size: 1em; bottom: 16px; }
      .dark-toggle { left: 16px; }
      .scroll-top { right: 16px; }
    }
  </style>
</head>

  <script>
    function showQR(type) {
      var modal = document.getElementById('qrModal');
      var img = document.getElementById('qrImage');
      var title = document.getElementById('qrTitle');
      if (type === 'wechat') { img.src = '/images/wechat-qr.jpg'; title.textContent = '微信扫码添加'; }
      modal.classList.add('active'); document.body.style.overflow = 'hidden';
    }
    function closeQR(e) {
      if (!e || e.target === document.getElementById('qrModal') || e.target.classList.contains('qr-modal-close')) {
        document.getElementById('qrModal').classList.remove('active'); document.body.style.overflow = '';
      }
    }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeQR(); });

    /* Scroll */
    window.addEventListener('scroll', function() {
      var st = document.getElementById('scrollTop');
      if (st) { if (window.scrollY > 400) st.classList.add('visible'); else st.classList.remove('visible'); }
    });
    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    /* Dark mode */
    function applyDark(isDark) {
      if (isDark) document.body.classList.add('dark-mode'); else document.body.classList.remove('dark-mode');
      var btn = document.querySelector('.dark-toggle');
      if (btn) btn.textContent = isDark ? '☀️' : '🌙';
    }
    function toggleDark() {
      var isDark = !document.body.classList.contains('dark-mode');
      applyDark(isDark); localStorage.setItem('dark-mode-manual', isDark);
    }
    (function initDark() {
      var h = new Date().getHours();
      var d = h < 7 || h >= 19;
      var m = localStorage.getItem('dark-mode-manual');
      if (m !== null) d = m === 'true';
      applyDark(d);
    })();
    setInterval(function() {
      var h = new Date().getHours(), m = localStorage.getItem('dark-mode-manual');
      if (m === null) { var ad = h < 7 || h >= 19; if (ad !== document.body.classList.contains('dark-mode')) applyDark(ad); }
    }, 60000);
  </script>
</body>
</html>
