  <style>
    .dot-grid {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: -1;
      background-image: radial-gradient(circle, rgba(255, 182, 193, 0.4) 1px, transparent 1px);
      background-size: 30px 30px; opacity: 0.6;
    }
    .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden; }
    .particle { position: absolute; width: 10px; height: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; opacity: 0.3; animation: float 15s infinite; }
    .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 20%; animation-delay: 2s; }
    .particle:nth-child(3) { left: 30%; animation-delay: 4s; }
    .particle:nth-child(4) { left: 40%; animation-delay: 6s; }
    .particle:nth-child(5) { left: 50%; animation-delay: 8s; }
    .particle:nth-child(6) { left: 60%; animation-delay: 10s; }
    .particle:nth-child(7) { left: 70%; animation-delay: 12s; }
    .particle:nth-child(8) { left: 80%; animation-delay: 14s; }
    @keyframes float { 0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.3; } 90% { opacity: 0.3; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
    .page-content { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      color: #ff9a9e; text-decoration: none; font-weight: 600;
      margin-bottom: 30px; padding: 10px 20px;
      background: white; border-radius: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
    }
    .back-link:hover { transform: translateX(-5px); box-shadow: 0 6px 20px rgba(255, 154, 158, 0.2); }
    .about-header { text-align: center; margin-bottom: 40px; animation: fadeInUp 0.6s ease; }
    .about-header h1 { font-size: 2.5em; background: linear-gradient(135deg, #ff9a9e, #fecfef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .about-header p { color: #888; font-size: 1.1em; }
    .interests { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin: 30px 0; }
    .interest-tag { padding: 8px 20px; background: linear-gradient(135deg, #fff5f5, #fff0f3); border: 2px solid rgba(255,154,158,0.2); border-radius: 25px; color: #c44569; font-size: 0.9em; font-weight: 600; transition: all 0.3s ease; }
    .interest-tag:hover { background: linear-gradient(135deg, #ff9a9e, #fecfef); color: white; transform: scale(1.05); }
    .qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; animation: fadeIn 0.3s ease; }
    .qr-modal.active { display: flex; }
    .qr-modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 350px; animation: scaleIn 0.3s ease; }
    .qr-modal h3 { margin: 0 0 20px; color: #333; font-size: 1.3em; }
    .qr-modal img { width: 250px; height: 250px; border-radius: 12px; border: 3px solid rgba(255,154,158,0.3); }
    .qr-modal p { color: #888; margin: 15px 0 0; font-size: 0.9em; }
    .qr-modal-close { margin-top: 20px; padding: 10px 30px; background: linear-gradient(135deg, #ff9a9e, #fecfef); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
    .qr-modal-close:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255, 154, 158, 0.3); }
    @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { .about-header h1 { font-size: 2em; } .qr-modal-content { margin: 20px; padding: 20px; } .qr-modal img { width: 200px; height: 200px; } }
  </style>

    <div id="qrModal" class="qr-modal" onclick="closeQR(event)">
    <div class="qr-modal-content">
      <h3 id="qrTitle" data-i18n="qr_title">扫码添加</h3>
      <img id="qrImage" src="" alt="QR Code">
      <p id="qrDesc" data-i18n="qr_desc">打开对应APP扫描二维码</p>
      <button class="qr-modal-close" onclick="closeQR()" data-i18n="qr_close">关闭</button>
    </div>
  </div>

  <script>
    function showQR(type) {
      const modal = document.getElementById('qrModal');
      const img = document.getElementById('qrImage');
      const title = document.getElementById('qrTitle');
      if (type === 'wechat') {
        img.src = '/images/wechat-qr.jpg';
        title.textContent = I18N.t('qr_wechat');
      }
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeQR(e) {
      if (!e || e.target === document.getElementById('qrModal') || e.target.classList.contains('qr-modal-close')) {
        document.getElementById('qrModal').classList.remove('active');
        document.body.style.overflow = '';
      }
    }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeQR(); });
  </script>

  <button class="dark-toggle" onclick="toggleDark()" title="切换深色模式">🌙</button>
  <script src="/js/lang-data.js"></script>
  <script>
    function toggleDark() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('dark-mode-manual', document.body.classList.contains('dark-mode'));
      var btn = document.querySelector('.dark-toggle');
      btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    }
    function updateDarkByTime() {
      var hour = new Date().getHours();
      var isDark = hour < 7 || hour >= 19;
      var manualSet = localStorage.getItem('dark-mode-manual');
      if (manualSet !== null) {
        isDark = manualSet === 'true';
      }
      if (isDark) {
        document.body.classList.add('dark-mode');
        document.querySelector('.dark-toggle').textContent = '☀️';
      } else {
        document.body.classList.remove('dark-mode');
        document.querySelector('.dark-toggle').textContent = '🌙';
      }
    }
    updateDarkByTime();
    setInterval(updateDarkByTime, 60000);
    I18N.init();
  </script>
